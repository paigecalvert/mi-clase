apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mi-clase.fullname" . }}
  labels:
    {{- include "mi-clase.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mi-clase.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mi-clase.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mi-clase.fullname" . }}
      imagePullSecrets:
        - name: enterprise-pull-secret
      initContainers:
        - name: wait-for-db
          image: proxy.miclase.site/proxy/mi-clase/docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "mi-clase.postgresqlHost" . }} {{ include "mi-clase.postgresqlPort" . }}; do
                echo "waiting for database..."; sleep 2
              done
      containers:
        - name: mi-clase
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: MINIO_ENDPOINT
              value: {{ include "mi-clase.minioEndpoint" . | quote }}
            - name: MINIO_PORT
              value: {{ include "mi-clase.minioPort" . | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.fileStorage.bucket | quote }}
            - name: MINIO_USE_SSL
              value: {{ if .Values.minio.enabled }}"false"{{ else }}{{ .Values.externalMinio.useSSL | toString | quote }}{{ end }}
            - name: LIBRE_TRANSLATE_URL
              value: {{ include "mi-clase.libreTranslateUrl" . | quote }}
          envFrom:
            - secretRef:
                name: {{ include "mi-clase.fullname" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
