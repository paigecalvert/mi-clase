apiVersion: v2
name: mi-clase
description: Spanish class tracker with notes, vocabulary, and homework management
type: application
version: 0.4.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: ">=14.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ">=18.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: ">=5.0.0"
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: cert-manager
    version: ">=1.13.0"
    repository: https://charts.jetstack.io
    condition: certManager.install
  - name: traefik
    version: ">=27.0.0"
    repository: https://helm.traefik.io/traefik
    condition: ingressController.enabled
  - name: replicated
    repository: oci://registry.replicated.com/library
    version: 1.19.2
