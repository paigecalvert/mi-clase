{{- if .Values.libretranslate.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-libretranslate
  labels:
    {{- include "mi-clase.labels" . | nindent 4 }}
    app.kubernetes.io/component: libretranslate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mi-clase.name" . }}-libretranslate
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mi-clase.name" . }}-libretranslate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: libretranslate
          image: "{{ .Values.libretranslate.image.repository }}:{{ .Values.libretranslate.image.tag }}"
          imagePullPolicy: {{ .Values.libretranslate.image.pullPolicy }}
          args:
            - --load-only
            - es,en
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /languages
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /languages
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          resources:
            {{- toYaml .Values.libretranslate.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-libretranslate
  labels:
    {{- include "mi-clase.labels" . | nindent 4 }}
    app.kubernetes.io/component: libretranslate
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "mi-clase.name" . }}-libretranslate
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
