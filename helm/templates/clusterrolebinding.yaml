apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mi-clase.fullname" . }}-support-bundle
  labels:
    {{- include "mi-clase.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mi-clase.fullname" . }}-support-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "mi-clase.fullname" . }}
    namespace: {{ .Release.Namespace }}
