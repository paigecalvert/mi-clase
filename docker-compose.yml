services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mi_clase
      POSTGRES_USER: mi_clase
      POSTGRES_PASSWORD: mi_clase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mi_clase"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mi_clase
      MINIO_ROOT_PASSWORD: mi_clase_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  libretranslate:
    image: libretranslate/libretranslate
    user: "0"
    command: --load-only es,en
    ports:
      - "5000:5000"
    volumes:
      - libretranslate_data:/home/libretranslate/.local/share/argos-translate
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000/languages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
  minio_data:
  libretranslate_data:
