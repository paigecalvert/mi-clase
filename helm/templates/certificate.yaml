{{- if and .Values.ingress.enabled (eq .Values.tls.mode "selfsigned") }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "mi-clase.fullname" . }}-selfsigned
  labels:
    {{- include "mi-clase.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mi-clase.fullname" . }}
  labels:
    {{- include "mi-clase.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ include "mi-clase.fullname" . }}-selfsigned
    kind: Issuer
  dnsNames:
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
{{- end }}
