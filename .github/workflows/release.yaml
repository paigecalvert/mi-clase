name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/paigecalvert/mi-clase
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: next
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "${latest}" ]]; then
            next="0.1.0"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<< "${ver}"
            patch=$((patch + 1))
            next="${major}.${minor}.${patch}"
          fi

          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next tag: v${next} (latest was: ${latest:-<none>})"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.next.outputs.tag }}"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
            exit 0
          fi

          git tag "${tag}"
          git push origin "${tag}"

  build:
    runs-on: ubuntu-22.04
    needs: [version]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: int128/docker-build-cache-config-action@v1
        id: cache
        with:
          image: ghcr.io/paigecalvert/mi-clase/cache

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: ${{ steps.cache.outputs.cache-from }}
          cache-to: ${{ steps.cache.outputs.cache-to }}

  release:
    runs-on: ubuntu-22.04
    needs: [version, build]
    outputs:
      release-sequence: ${{ steps.create-release.outputs.release-sequence }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Stamp image tag into chart values
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          yq -i ".image.tag = \"${VERSION}\"" helm/values.yaml

      - name: Package chart
        run: |
          rm -f manifests/mi-clase-*.tgz
          helm package helm/ \
            --version=${{ needs.version.outputs.version }} \
            --app-version=${{ needs.version.outputs.version }} \
            -d manifests/

      - name: Create release and promote to Unstable
        id: create-release
        uses: replicatedhq/replicated-actions/create-release@v1
        with:
          app-slug: mi-clase
          api-token: ${{ secrets.REPLICATED_TEST_API_TOKEN }}
          yaml-dir: manifests
          promote-channel: Unstable
          version: ${{ needs.version.outputs.version }}

  test:
    runs-on: ubuntu-22.04
    needs: [version, release]
    env:
      CHANNEL_NAME: ci-${{ github.run_id }}
      CUSTOMER_NAME: ci-test-${{ github.run_id }}
      CUSTOMER_EMAIL: ci-test-${{ github.run_id }}@ci.mi-clase.example
    steps:
      - name: Install Replicated CLI
        uses: replicatedhq/setup-replicated@v1
        with:
          api-token: ${{ secrets.REPLICATED_TEST_API_TOKEN }}
          app-slug: mi-clase

      - name: Create temp channel
        id: create-channel
        run: |
          set -euo pipefail
          channel_json=$(replicated channel create \
            --name "$CHANNEL_NAME" \
            --output json)
          echo "channel-id=$(echo "$channel_json" | jq -r '.[0].id')" >> "$GITHUB_OUTPUT"
          echo "channel-slug=$(echo "$channel_json" | jq -r '.[0].channelSlug')" >> "$GITHUB_OUTPUT"

      - name: Promote release to temp channel
        run: |
          set -euo pipefail
          replicated release promote \
            "${{ needs.release.outputs.release-sequence }}" \
            "${{ steps.create-channel.outputs.channel-id }}"

      - name: Create temp customer
        id: create-customer
        run: |
          set -euo pipefail
          replicated customer create \
            --name "$CUSTOMER_NAME" \
            --email "$CUSTOMER_EMAIL" \
            --channel "$CHANNEL_NAME" \
            --helm-install

          inspect=$(replicated customer inspect \
            --customer "$CUSTOMER_NAME" \
            --output json)
          customer_id=$(echo "$inspect" | jq -r '.id')
          registry_pass=$(echo "$inspect" | jq -r '.installationId')

          echo "::add-mask::${registry_pass}"
          echo "customer-id=${customer_id}" >> "$GITHUB_OUTPUT"
          echo "registry-pass=${registry_pass}" >> "$GITHUB_OUTPUT"

      - name: Create CMX cluster
        id: create-cluster
        run: |
          set -euo pipefail
          cluster_id=$(replicated cluster create \
            --distribution k3s \
            --version 1.29 \
            --nodes 1 \
            --ttl 2h \
            --wait 10m \
            --output json | jq -r '.id')
          echo "cluster-id=${cluster_id}" >> "$GITHUB_OUTPUT"

      - name: Get kubeconfig
        run: |
          set -euo pipefail
          replicated cluster kubeconfig \
            "${{ steps.create-cluster.outputs.cluster-id }}" \
            --stdout > kubeconfig.yaml
          echo "KUBECONFIG=$(pwd)/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install chart
        run: |
          set -euo pipefail
          helm registry login registry.miclase.site \
            --username "$CUSTOMER_EMAIL" \
            --password "${{ steps.create-customer.outputs.registry-pass }}"

          helm install mi-clase \
            oci://registry.miclase.site/mi-clase/${{ steps.create-channel.outputs.channel-slug }}/mi-clase \
            --version "${{ needs.version.outputs.version }}" \
            --namespace mi-clase \
            --create-namespace \
            --timeout 10m \
            --wait

      - name: Health check
        run: |
          kubectl rollout status deployment/mi-clase \
            --namespace mi-clase --timeout=120s
          kubectl get pods --namespace mi-clase

      - name: Cleanup
        if: always()
        run: |
          replicated cluster rm \
            "${{ steps.create-cluster.outputs.cluster-id }}" || true
          replicated customer archive \
            "${{ steps.create-customer.outputs.customer-id }}" || true
          replicated channel rm \
            "${{ steps.create-channel.outputs.channel-id }}" || true
