# HelmChart custom resource
apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: samplechart
spec:
  chart:
    name: mi-clase
    chartVersion: 0.4.0

  releaseName: mi-clase
  namespace: mi-clase

  values:
    service:
      type: ClusterIP

    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: repl{{ ConfigOption "hostname" }}
          paths:
            - path: /
              pathType: Prefix
    tls:
      mode: ""

    certManager:
      install: false
      createIssuer: false

    ingressController:
      enabled: false

    features:
      quizzesEnabled: 'repl{{ LicenseFieldValue "quiz_feature" }}'