apiVersion: v1
kind: Secret
metadata:
  name: "{{ .Release.Name }}-preflight-config"
  labels:
    troubleshoot.sh/kind: preflight
    {{- include "mi-clase.labels" . | nindent 4 }}
stringData:
  preflight.yaml: |
    apiVersion: troubleshoot.sh/v1beta3
    kind: Preflight
    metadata:
      name: {{ include "mi-clase.fullname" . }}-preflight
    spec:
      collectors:
        - clusterResources: {}
        {{- if not .Values.postgresql.enabled }}
        - postgres:
            collectorName: external-postgresql
            uri: "postgres://{{ include "mi-clase.postgresqlUsername" . }}:{{ include "mi-clase.postgresqlPassword" . }}@{{ include "mi-clase.postgresqlHost" . }}:{{ include "mi-clase.postgresqlPort" . }}/{{ include "mi-clase.postgresqlDatabase" . }}"
        {{- end }}
        {{- if not .Values.redis.enabled }}
        - redis:
            collectorName: external-redis
            uri: "redis://:{{ .Values.externalRedis.password }}@{{ .Values.externalRedis.host }}:{{ .Values.externalRedis.port }}"
        {{- end }}
        {{- if false }}
        - http:
            collectorName: libretranslate-connectivity
            get:
              url: "{{ .Values.libretranslate.externalUrl }}/languages"
        {{- end }}

      analyzers:
        - clusterVersion:
            checkName: Kubernetes Version
            docString: |
              Verifies that the cluster is running Kubernetes 1.25.0 or later, which is the minimum
              version required by Mi Clase.
            outcomes:
              - fail:
                  when: "< 1.25.0"
                  message: |
                    Mi Clase requires Kubernetes 1.25.0 or later. Your cluster is running an older
                    version that is no longer supported. Please upgrade your cluster before installing.
              - pass:
                  message: "Kubernetes version meets the minimum requirement of 1.25.0."

        - distribution:
            checkName: Kubernetes Distribution
            docString: |
              Checks that the Kubernetes distribution is supported. Docker Desktop and MicroK8s are
              not supported deployment targets.
            outcomes:
              - fail:
                  when: "== docker-desktop"
                  message: |
                    Docker Desktop is not a supported deployment target for Mi Clase.
                    Please use a supported distribution such as EKS, GKE, AKS, or k3s.
                    See the documentation for a full list of supported distributions.
              - fail:
                  when: "== microk8s"
                  message: |
                    MicroK8s is not a supported deployment target for Mi Clase.
                    Please use a supported distribution such as EKS, GKE, AKS, or k3s.
                    See the documentation for a full list of supported distributions.
              - pass:
                  message: "Kubernetes distribution is supported."

        - nodeResources:
            checkName: Cluster CPU
            docString: |
              Verifies total cluster CPU capacity. Mi Clase with embedded PostgreSQL, Redis, and MinIO
              requires at least 2 cores; 4 cores are recommended.
            outcomes:
              - fail:
                  when: "sum(cpuCapacity) < 2"
                  message: |
                    The cluster has fewer than 2 CPU cores available. Mi Clase and its embedded
                    dependencies (PostgreSQL, Redis, MinIO) require at least 2 cores to schedule
                    all workloads. Add more nodes or use a larger instance type.
              - warn:
                  when: "sum(cpuCapacity) < 4"
                  message: |
                    The cluster has fewer than 4 CPU cores. Mi Clase runs best with at least 4 cores
                    when using all embedded services. Performance may be degraded under load.
              - pass:
                  message: "Cluster CPU meets the recommended requirement."

        - nodeResources:
            checkName: Node Memory
            docString: |
              Verifies that each node has sufficient memory. Mi Clase requires at least 2Gi per node;
              4Gi is recommended for stable operation with embedded services.
            outcomes:
              - fail:
                  when: "min(memoryCapacity) < 2Gi"
                  message: |
                    At least one node has less than 2Gi of memory. Mi Clase and its embedded
                    dependencies require at least 2Gi per node to schedule successfully.
                    Add more memory or use a larger instance type.
              - warn:
                  when: "min(memoryCapacity) < 4Gi"
                  message: |
                    At least one node has less than 4Gi of memory. Mi Clase runs best with 4Gi
                    or more per node when using embedded services. Consider a larger instance type.
              - pass:
                  message: "Node memory meets the recommended requirement of 4Gi."
        {{- if or .Values.postgresql.enabled .Values.redis.enabled .Values.minio.enabled }}

        - storageClass:
            checkName: Default Storage Class
            docString: |
              Checks that a default StorageClass exists for dynamic PVC provisioning. Required when
              any of the embedded services (PostgreSQL, Redis, MinIO) are enabled.
            outcomes:
              - fail:
                  message: |
                    No default StorageClass was found in the cluster. Mi Clase's embedded
                    PostgreSQL, Redis, and/or MinIO require a default StorageClass to provision
                    PersistentVolumes. Install a StorageClass and mark it as default before installing.
              - pass:
                  message: "Default StorageClass is available."
        {{- end }}
        {{- if not .Values.postgresql.enabled }}

        - postgres:
            checkName: External PostgreSQL Connectivity
            collectorName: external-postgresql
            docString: |
              Verifies that the cluster can reach the external PostgreSQL instance configured in
              externalPostgresql values. Only runs when postgresql.enabled is false.
            outcomes:
              - fail:
                  when: "connected == false"
                  message: |
                    Cannot connect to PostgreSQL at {{ .Values.externalPostgresql.host }}:{{ include "mi-clase.postgresqlPort" . }}.
                    Verify that:
                      - The hostname is resolvable from within the cluster
                      - The user '{{ include "mi-clase.postgresqlUsername" . }}' has access to the '{{ include "mi-clase.postgresqlDatabase" . }}' database
                      - The password in externalPostgresql.password is correct
                      - PostgreSQL is running and accepting connections on port {{ include "mi-clase.postgresqlPort" . }}
              - pass:
                  when: "connected == true"
                  message: "Successfully connected to external PostgreSQL at {{ .Values.externalPostgresql.host }}."
              - warn:
                  message: "PostgreSQL connectivity check returned an unexpected result. Check the preflight collector logs."
        {{- end }}
        {{- if not .Values.redis.enabled }}

        - redis:
            checkName: External Redis Connectivity
            collectorName: external-redis
            docString: |
              Verifies that the cluster can reach the external Redis instance configured in
              externalRedis values. Only runs when redis.enabled is false.
            outcomes:
              - fail:
                  when: "connected == false"
                  message: |
                    Cannot connect to Redis at {{ .Values.externalRedis.host }}:{{ .Values.externalRedis.port }}.
                    Verify that:
                      - The host is reachable from within the cluster
                      - The Redis instance is running and accepting connections on port {{ .Values.externalRedis.port }}
                      - The password in externalRedis.password is correct (if auth is enabled)
              - pass:
                  when: "connected == true"
                  message: "Successfully connected to external Redis at {{ .Values.externalRedis.host }}."
              - warn:
                  message: "Redis connectivity check returned an unexpected result. Check the preflight collector logs."
        {{- end }}
        {{- if false }}
        - textAnalyze:
            checkName: External LibreTranslate Connectivity
            fileName: http/libretranslate-connectivity/result.json
            regex: '"status":2[0-9][0-9]'
            docString: |
              Verifies that the external LibreTranslate instance is reachable from the cluster.
              Only runs when libretranslate.enabled is false and libretranslate.externalUrl is set.
            outcomes:
              - fail:
                  when: "false"
                  message: |
                    Cannot reach LibreTranslate at {{ .Values.libretranslate.externalUrl }}.
                    The vocabulary translation feature will not work without a reachable LibreTranslate instance.
                    Verify that:
                      - The URL in libretranslate.externalUrl is correct and accessible from the cluster
                      - The LibreTranslate service is running and responding to requests
                      - Network policies allow outbound access to the endpoint
              - pass:
                  when: "true"
                  message: "Successfully reached external LibreTranslate at {{ .Values.libretranslate.externalUrl }}."
        {{- end }}
